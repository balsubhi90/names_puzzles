<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فك الشفرة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Cairo', sans-serif; background: #000; overflow: hidden; color: #e0e6ed; }

        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('background.png') no-repeat center center / cover;
            transition: background 0.8s ease; z-index: 1;
        }

        #main-logo {
            position: fixed; z-index: 200;
            transition: all 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
        }

        .logo-home { top: 40%; left: 50%; transform: translate(-50%, -50%); width: 500px; }
        .logo-game { top: 35%; left: 80%; transform: translate(-50%, -50%); width: 280px; }

        /* أيقونة التحكم بالصوت */
        #music-control {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px); padding: 10px; border-radius: 50%;
            cursor: pointer; font-size: 24px; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; color: white;
        }
        #music-control:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }

        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 100;
        }

        #start-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-container { margin-top: 450px; display: flex; flex-direction: row; gap: 20px; }
        .btn-main { padding: 15px 40px; min-width: 180px; font-size: 1.4rem; border-radius: 8px; cursor: pointer; font-weight: 900; transition: 0.3s; border: none; }
        .btn-start { background: linear-gradient(180deg, #ffffff, #adb5bd); color: #2c3e50; box-shadow: 0 5px 0 #2c3e50; }
        .btn-secondary { background: rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); }

        #how-to-screen {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 40px; z-index: 300;
        }
        .instruction-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 20px; max-width: 500px;
        }
        .instruction-box h2 { color: #f1c40f; margin-bottom: 25px; font-size: 2.2rem; }
        .instruction-box p { font-size: 1.3rem; line-height: 1.8; margin-bottom: 15px; }
        .btn-understand { margin-top: 40px; } 

        #main-game { display: none; }

        .puzzle-section { 
            position: absolute; left: 10%; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 20px; opacity: 0;
        }

        .sidebar-right-info {
            position: absolute; left: 80%; top: 60%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; opacity: 0;
        }

        .show-elements { animation: fadeInDelayed 0.8s ease-out forwards; animation-delay: 0.8s; }
        .show-score { animation: fadeInScore 0.8s ease-out forwards; animation-delay: 1s; }

        @keyframes fadeInDelayed { from { opacity: 0; transform: translateY(-50%) scale(0.9); } to { opacity: 1; transform: translateY(-50%) scale(1); } }
        @keyframes fadeInScore { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .score-info { 
            font-size: 1.6rem; font-weight: bold; background: rgba(0,0,0,0.6); 
            padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); 
            width: 160px; text-align: center; 
        }

        #img-container { 
            position: relative; background: rgba(0,0,0,0.6); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; justify-content: center; transition: 0.4s; overflow: hidden;
        }

        #puzzle-img { max-width: 600px; max-height: 400px; border-radius: 5px; }

        .status-feedback {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 200px; display: none; z-index: 10; animation: pulseFeedback 0.6s ease;
        }
        .correct-mark { color: #2ecc71; text-shadow: 0 0 50px rgba(46, 204, 113, 0.6); }
        .wrong-mark { color: #ff6b6b; text-shadow: 0 0 50px rgba(255, 107, 107, 0.6); }

        @keyframes pulseFeedback { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .input-group { display: flex; gap: 15px; }
        input { padding: 15px; width: 350px; border-radius: 10px; border: 1px solid #1e3a5f; font-size: 1.6rem; text-align: center; background: rgba(0,0,0,0.8); color: #fff; outline: none; }
        .btn-check { padding: 15px 35px; font-size: 1.3rem; background: #f1c40f; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        footer { position: absolute; bottom: 25px; left: 25px; z-index: 15; }
        .btn-exit-box { display: flex; align-items: center; gap: 10px; background: rgba(231,76,60,0.2); color: #ff6b6b; cursor: pointer; padding: 12px 25px; border-radius: 10px; border: 1px solid #e74c3c; font-weight: bold; }

        #result-screen { display: none; background: rgba(0,0,0,0.95); text-align: center; flex-direction: column; justify-content: center; align-items: center;}

        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-20px); } }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>

<audio id="bg-music" src="bgmusic.mp3" loop></audio>
<audio id="snd-success" src="success.mp3"></audio>
<audio id="snd-wrong" src="wrong.mp3"></audio>

<div id="music-control" onclick="toggleMusic()">🔊</div>

<img src="logo.png" id="main-logo" class="logo-home floating" alt="الشعار">

<div id="start-screen" class="screen">
    <div class="btn-container">
        <button class="btn-main btn-start" onclick="startGame()">ابدأ اللعب</button>
        <button class="btn-main btn-secondary" onclick="toggleHowTo(true)">كيف ألعب؟</button>
    </div>
</div>

<div id="how-to-screen" class="screen">
    <div class="instruction-box">
        <h2>طريقة اللعب</h2>
        <p>1. ستظهر لك صورة مشفرة تعبر عن اسم.</p>
        <p>2. حاول تخمين الحل واكتبه في المربع أسفل الصورة.</p>
        <p>3. الإجابة الصحيحة تمنحك نقطة، والخاطئة تخصم منك نقطة.</p>
        <button class="btn-main btn-start btn-understand" onclick="toggleHowTo(false)">فهمت!</button>
    </div>
</div>

<div id="main-game" class="screen">
    <div id="puzzle-box" class="puzzle-section">
        <div id="img-container">
            <img id="puzzle-img" src="" alt="اللغز">
            <div id="feedback-correct" class="status-feedback correct-mark">✅</div>
            <div id="feedback-wrong" class="status-feedback wrong-mark">❌</div>
        </div>
        <div class="input-group">
            <input type="text" id="user-ans" placeholder="اكتب الحل هنا..." autocomplete="off">
            <button class="btn-check" onclick="checkAnswer()">تحقق</button>
        </div>
    </div>

    <div id="score-box" class="sidebar-right-info">
        <div class="score-info">
            <div style="font-size: 0.9rem; color: #aaa;">النقاط</div>
            <span id="score-val">0</span>
        </div>
    </div>

    <footer>
        <div class="btn-exit-box" onclick="endGame()">إنهاء اللعب</div>
    </footer>
</div>

<div id="result-screen" class="screen">
    <h1 style="font-size: 4rem; color: #fff;">انتهت اللعبة!</h1>
    <p style="font-size: 2.5rem; color: #f1c40f;">نقاطك النهائية: <span id="final-score">0</span></p>
    <button class="btn-main btn-start" onclick="location.reload()">العودة للرئيسية</button>
</div>

<script>
    let puzzles = []; let currentIdx = 0; let score = 0;
    const bgMusic = document.getElementById('bg-music');
    const musicIcon = document.getElementById('music-control');

    async function loadPuzzles() {
        try {
            const response = await fetch('puzzles.json');
            puzzles = await response.json();
            puzzles.sort(() => Math.random() - 0.5); 
        } catch (e) { console.error("الملفات غير موجودة"); }
    }

    // وظيفة التحكم بالصوت
    function toggleMusic() {
        if (bgMusic.paused) {
            bgMusic.play();
            musicIcon.innerText = "🔊";
        } else {
            bgMusic.pause();
            musicIcon.innerText = "🔇";
        }
    }

    function toggleHowTo(show) {
        const screen = document.getElementById('how-to-screen');
        const logo = document.getElementById('main-logo');
        if (show) {
            screen.style.display = 'flex';
            logo.style.opacity = '0.2';
        } else {
            screen.style.display = 'none';
            logo.style.opacity = '1';
        }
    }

    function startGame() {
        if(puzzles.length === 0) return;
        
        // محاولة تشغيل الموسيقى عند بدء اللعب (لأن المتصفحات تتطلب تفاعل المستخدم)
        bgMusic.play().catch(e => console.log("التشغيل التلقائي ممنوع، سيتم التشغيل عند الضغط"));

        const logo = document.getElementById('main-logo');
        logo.classList.remove('logo-home', 'floating');
        logo.classList.add('logo-game');
        
        document.getElementById('dynamic-bg').style.background = "url('background_play.png') no-repeat center center / cover";
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-game').style.display = 'block';

        document.getElementById('puzzle-box').classList.add('show-elements');
        document.getElementById('score-box').classList.add('show-score');
        
        renderPuzzle();
    }

    function renderPuzzle() {
        if (currentIdx >= puzzles.length) return endGame();
        const img = document.getElementById('puzzle-img');
        const container = document.getElementById('img-container');
        document.getElementById('feedback-correct').style.display = 'none';
        document.getElementById('feedback-wrong').style.display = 'none';

        img.src = "images/" + puzzles[currentIdx].img;
        img.onload = function() {
            container.style.width = (img.clientWidth * 1.2) + "px";
            container.style.height = (img.clientHeight * 1.2) + "px";
        };
        document.getElementById('user-ans').value = ""; 
        document.getElementById('user-ans').focus();
    }

    function checkAnswer() {
        const inputField = document.getElementById('user-ans');
        const userVal = inputField.value.trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه');
        const correctVal = puzzles[currentIdx].ans.trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه');
        
        if (userVal === correctVal) {
            score++; 
            document.getElementById('score-val').innerText = score;
            document.getElementById('snd-success').play();
            document.getElementById('feedback-correct').style.display = 'block';
            setTimeout(() => { currentIdx++; renderPuzzle(); }, 1000);
        } else {
            score--; 
            document.getElementById('score-val').innerText = score;
            document.getElementById('snd-wrong').play();
            document.getElementById('feedback-wrong').style.display = 'block';
            setTimeout(() => { 
                document.getElementById('feedback-wrong').style.display = 'none';
                inputField.value = ""; 
                inputField.focus(); 
            }, 1000);
        }
    }

    function endGame() {
        document.getElementById('main-logo').style.display = 'none';
        document.getElementById('main-game').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }

    document.getElementById('user-ans').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
    
    // تشغيل الموسيقى بمجرد الضغط في أي مكان في الصفحة لأول مرة
    window.addEventListener('click', () => {
        if(bgMusic.paused && musicIcon.innerText === "🔊") {
            bgMusic.play();
        }
    }, { once: true });

    loadPuzzles();
</script>
</body>
</html>
